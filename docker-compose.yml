name: ecommerce-flarano-herrera

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Define DB_PASSWORD}
      POSTGRES_DB: ecommerce
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_NAME: ecommerce
      DB_PASSWORD: ${DB_PASSWORD:?Define DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-true}
      SEED_TEST_USERS: ${SEED_TEST_USERS:-false}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
