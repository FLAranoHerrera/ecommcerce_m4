services:
  - type: web
    name: ecommerce-flarano-herrera
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RATE_LIMIT_TTL
        value: 60
      - key: RATE_LIMIT_LIMIT
        value: 50
      - key: DB_MIGRATIONS_RUN
        value: true
      - key: DB_SSL
        value: true
      - key: ENABLE_SWAGGER
        value: false
